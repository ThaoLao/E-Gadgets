<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <meta content="" name="description"/>
    <meta content="" name="producer"/>
    <title>Admin - Quản lý người dùng</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin/admin_sidebar.css}">
    <script crossorigin="anonymous" th:src="@{/js/admin/fontawesome-all.js}"></script>
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }
        
        .page-title i {
            margin-right: 15px;
            font-size: 1.8rem;
        }
        
        .page-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .modern-btn {
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .modern-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-primary-modern {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-danger-modern {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
        }
        
        .modern-table {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .modern-table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1.5rem 1rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        
        .modern-table tbody td {
            padding: 1.5rem 1rem;
            border: none;
            border-bottom: 1px solid #f1f3f4;
            vertical-align: middle;
        }
        
        .modern-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
            transform: scale(1.01);
            transition: all 0.3s ease;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .action-buttons .btn {
            font-size: 0.75rem;
            padding: 6px 12px;
        }
        
        .pagination-modern {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 1rem;
            margin-top: 2rem;
        }
        
        .pagination-modern .page-link {
            border: none;
            color: #667eea;
            padding: 10px 15px;
            margin: 0 2px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .pagination-modern .page-link:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }
        
        .pagination-modern .page-item.active .page-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .user-id {
            font-weight: 700;
            color: #667eea;
        }
        
        .user-email {
            color: #667eea;
            font-weight: 500;
        }
        
        .user-name {
            font-weight: 600;
            color: #495057;
        }
        
        .user-phone {
            color: #6c757d;
            font-weight: 500;
        }
        
        .user-address {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #6c757d;
        }
        
        .role-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .role-admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .role-user {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
    </style>
</head>

<body class="sb-nav-fixed">
<div th:replace="admin/fragments/header :: header_nav"></div>
<div id="layoutSidenav">
    <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
    <!-- Copy den day-->
    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <!-- Page Header -->
                <div class="page-header">
                    <h1 class="page-title">
                        <i class="fas fa-users"></i>
                        Quản lý người dùng
                    </h1>
                    <p class="page-subtitle">Quản lý thông tin và quyền hạn của người dùng</p>
                </div>

                <!-- Users Table -->
                <div class="modern-table">
                    <table class="table mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên đăng nhập</th>
                            <th>Họ và tên</th>
                            <th>Số điện thoại</th>
                            <th>Địa chỉ</th>
                            <th>Vai trò</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td>
                                <span class="user-id" th:text="${user.id}"></span>
                            </td>
                            <td>
                                <span class="user-email" th:text="${user.email}"></span>
                            </td>
                            <td>
                                <span class="user-name" th:text="${user.fullName}"></span>
                            </td>
                            <td>
                                <span class="user-phone" th:text="${user.phoneNumber}"></span>
                            </td>
                            <td class="user-address" th:text="${user.address}"></td>
                            <td>
                                <span th:each="role : ${user.getRoles()}">
                                    <span class="role-badge role-admin" th:if="${role.name == 'ROLE_ADMIN'}">ADMIN</span>
                                    <span class="role-badge role-user" th:if="${role.name == 'ROLE_USER'}">USER</span>
                                </span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <span th:each="role : ${user.getRoles()}">
                                        <button class="btn modern-btn btn-danger-modern btn-sm" 
                                                th:onclick="'deleteUser('+ ${user.id} +')'"
                                                th:unless="${role.name == 'ROLE_ADMIN'}">
                                            <i class="fas fa-trash"></i>
                                            Xóa
                                        </button>
                                    </span>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="d-flex justify-content-center" th:if="${users.totalPages > 1}">
                    <nav aria-label="Page navigation example" class="pagination-modern">
                        <ul class="pagination mb-0">
                            <li th:class="${pageNumber == users.getNumber() +1 ? 'page-item active' : 'page-item'}" th:each="pageNumber : ${#numbers.sequence(1, users.totalPages)}">
                                <a class="page-link" th:href="@{/admin/users_management(page=${pageNumber})}" th:text="${pageNumber}"></a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </main>
        
        <script>
            function deleteUser(userId) {
                if (confirm('Bạn có chắc chắn muốn xóa người dùng này không?')) {
                    window.location.href = '/admin/users_management/delete_user/' + userId;
                }
            }
        </script>

        <div th:replace="admin/fragments/footer :: footer"></div>
    </div>
</div>

<script crossorigin="anonymous" th:src="@{/js/admin/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/admin/scripts.js}"></script>
<script th:src="@{/js/admin/contacts.js}"></script>
</body>

</html>
