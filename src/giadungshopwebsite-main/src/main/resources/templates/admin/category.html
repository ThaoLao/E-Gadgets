<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <meta content="" name="description"/>
    <meta content="" name="producer"/>
    <title>Admin - Quản lý danh mục</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin/admin_sidebar.css}">
    <script crossorigin="anonymous" th:src="@{/js/admin/fontawesome-all.js}"></script>
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }
        
        .page-title i {
            margin-right: 15px;
            font-size: 1.8rem;
        }
        
        .page-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .modern-btn {
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .modern-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-primary-modern {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-danger-modern {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
        }
        
        .modern-table {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .modern-table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1.5rem 1rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        
        .modern-table tbody td {
            padding: 1.5rem 1rem;
            border: none;
            border-bottom: 1px solid #f1f3f4;
            vertical-align: middle;
        }
        
        .modern-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
            transform: scale(1.01);
            transition: all 0.3s ease;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .action-buttons .btn {
            font-size: 0.75rem;
            padding: 6px 12px;
        }
        
        .pagination-modern {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 1rem;
            margin-top: 2rem;
        }
        
        .pagination-modern .page-link {
            border: none;
            color: #667eea;
            padding: 10px 15px;
            margin: 0 2px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .pagination-modern .page-link:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }
        
        .pagination-modern .page-item.active .page-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .alert-modern {
            border: none;
            border-radius: 15px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .alert-primary-modern {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .category-id {
            font-weight: 700;
            color: #667eea;
        }
        
        .category-name {
            font-weight: 600;
            color: #495057;
        }
        
        .description-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #6c757d;
        }
        
        .modal-modern .modal-content {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal-modern .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px 20px 0 0;
        }
        
        .modal-modern .btn-close {
            filter: invert(1);
        }
        
        .modal-modern .modal-footer {
            border: none;
            padding: 1.5rem;
        }
    </style>
</head>

<body class="sb-nav-fixed">
<div th:replace="admin/fragments/header :: header_nav"></div>
<div id="layoutSidenav">
    <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <!-- Page Header -->
                <div class="page-header">
                    <h1 class="page-title">
                        <i class="fas fa-tags"></i>
                        Quản lý danh mục
                    </h1>
                    <p class="page-subtitle">Quản lý các danh mục sản phẩm đồ điện tử</p>
                </div>

                <!-- Alert Messages -->
                <div class="alert alert-primary-modern alert-modern" role="alert" th:if="${message}">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${message}"></span>
                </div>

                <!-- Add Category Button -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div></div>
                    <a class="btn modern-btn btn-primary-modern" th:href="@{/admin/categories_management/add}">
                        <i class="fas fa-plus"></i>
                        Thêm danh mục mới
                    </a>
                </div>

                <!-- Categories Table -->
                <div class="modern-table">
                    <table class="table mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên danh mục</th>
                            <th>Mô tả</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="category : ${categories}">
                            <td>
                                <span class="category-id" th:text="${category.id}"></span>
                            </td>
                            <td>
                                <span class="category-name" th:text="${category.name}"></span>
                            </td>
                            <td class="description-cell" th:text="${category.description}"></td>
                            <td>
                                <div class="action-buttons">
                                    <a class="btn modern-btn btn-primary-modern btn-sm" th:href="@{'/admin/categories_management/edit/' + ${category.id}}">
                                        <i class="fas fa-edit"></i>
                                        Sửa
                                    </a>
                                    <button class="btn modern-btn btn-danger-modern btn-sm btn-delete" th:data-category-id="${category.id}">
                                        <i class="fas fa-trash"></i>
                                        Xóa
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <nav aria-label="Page navigation" class="pagination-modern">
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? disabled : ''">
                            <a class="page-link" th:href="@{/admin/categories_management?page=1}">
                                <i class="fas fa-angle-double-left"></i> Trang đầu
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${1+currentPage == pageNumber} ? active : ''" th:each="pageNumber : ${#numbers.sequence(1, totalPages)}">
                            <a class="page-link" th:href="@{/admin/categories_management(page=${pageNumber})}" th:text="${pageNumber}"></a>
                        </li>
                        <li class="page-item" th:classappend="${1 + currentPage == totalPages} ? disabled : ''">
                            <a class="page-link" th:href="@{/admin/categories_management(page=${totalPages})}">
                                Trang cuối <i class="fas fa-angle-double-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </main>
        <div th:replace="admin/fragments/footer :: footer"></div>
    </div>
</div>

<!-- Modal for Delete Confirmation -->
<div aria-hidden="true" aria-labelledby="deleteConfirmationModalLabel" class="modal fade modal-modern" id="deleteConfirmationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteConfirmationModalLabel">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Xác nhận xoá danh mục
                </h5>
                <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body">
                <p>Bạn có chắc chắn muốn xoá danh mục này không?</p>
                <p class="text-muted small">Hành động này không thể hoàn tác!</p>
            </div>
            <div class="modal-footer">
                <button class="btn modern-btn btn-secondary" data-bs-dismiss="modal" type="button">
                    <i class="fas fa-times"></i> Hủy
                </button>
                <a class="btn modern-btn btn-danger-modern" id="deleteButton">
                    <i class="fas fa-trash"></i> Xoá
                </a>
            </div>
        </div>
    </div>
</div>

<script crossorigin="anonymous" th:src="@{/js/admin/bootstrap.bundle.min.js}"></script>
<script crossorigin="anonymous" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:src="@{/js/admin/scripts.js}"></script>
<script th:src="@{/js/admin/contacts.js}"></script>

<!-- JavaScript for Delete Confirmation -->
<script>
    $(document).ready(function () {
        $(".btn-delete").on("click", function () {
            var categoryId = $(this).attr("data-category-id");
            var deleteUrl = "/admin/categories_management/delete/" + categoryId;

            $("#deleteButton").attr("href", deleteUrl);
            $("#deleteConfirmationModal").modal("show");
        });
    });
</script>
</body>
</html>
