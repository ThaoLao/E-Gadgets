<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <meta content="" name="description"/>
    <meta content="" name="producer"/>
    <title>Admin - Quản lý liên hệ</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin/admin_sidebar.css}">
    <script crossorigin="anonymous" th:src="@{/js/admin/fontawesome-all.js}"></script>
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }
        
        .page-title i {
            margin-right: 15px;
            font-size: 1.8rem;
        }
        
        .page-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .filter-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .filter-form {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .form-group {
            margin-bottom: 0;
        }
        
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-select {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
            min-width: 200px;
        }
        
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
            outline: none;
            background: white;
        }
        
        .modern-btn {
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .modern-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-success-modern {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        .btn-danger-modern {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
        }
        
        .modern-table {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .modern-table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1.5rem 1rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        
        .modern-table tbody td {
            padding: 1.5rem 1rem;
            border: none;
            border-bottom: 1px solid #f1f3f4;
            vertical-align: middle;
        }
        
        .modern-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
            transform: scale(1.01);
            transition: all 0.3s ease;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .action-buttons .btn {
            font-size: 0.75rem;
            padding: 6px 12px;
        }
        
        .pagination-modern {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 1rem;
            margin-top: 2rem;
        }
        
        .pagination-modern .page-link {
            border: none;
            color: #667eea;
            padding: 10px 15px;
            margin: 0 2px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .pagination-modern .page-link:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }
        
        .pagination-modern .page-item.active .page-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .contact-id {
            font-weight: 700;
            color: #667eea;
        }
        
        .contact-name {
            font-weight: 600;
            color: #495057;
        }
        
        .contact-email {
            color: #667eea;
            font-weight: 500;
        }
        
        .contact-subject {
            font-weight: 600;
            color: #495057;
        }
        
        .message-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #6c757d;
        }
        
        .date-badge {
            background: #f8f9fa;
            color: #495057;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }
    </style>
</head>

<body class="sb-nav-fixed">
<!-- Copy tu day-->
<div th:replace="admin/fragments/header :: header_nav"></div>
<div id="layoutSidenav">
    <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
    <!-- Copy den day-->
    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <!-- Page Header -->
                <div class="page-header">
                    <h1 class="page-title">
                        <i class="fas fa-envelope"></i>
                        Quản lý liên hệ
                    </h1>
                    <p class="page-subtitle">Quản lý các tin nhắn và phản hồi từ khách hàng</p>
                </div>

                <!-- Filter Section -->
                <div class="filter-section">
                    <form id="yourFormId" method="get" th:action="@{/admin/contacts}">
                        <div class="filter-form">
                            <div class="form-group">
                                <label for="sortFilter" class="form-label">
                                    <i class="fas fa-sort me-2"></i>Sắp xếp theo:
                                </label>
                                <select class="form-select" id="sortFilter" name="sort_by" onchange="submitSort();" th:value="${sortBy}">
                                    <option th:selected="${sortBy == 'oldest'}" th:value="oldest">Cũ nhất</option>
                                    <option th:selected="${sortBy == 'newest'}" th:value="newest">Mới nhất</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Contacts Table -->
                <div class="modern-table">
                    <table class="table mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Email</th>
                            <th>Chủ đề</th>
                            <th>Tin nhắn</th>
                            <th>Ngày tạo</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="contact : ${contacts}">
                            <td>
                                <span class="contact-id" th:text="${contact.id}"></span>
                            </td>
                            <td>
                                <span class="contact-name" th:text="${contact.name}"></span>
                            </td>
                            <td>
                                <span class="contact-email" th:text="${contact.email}"></span>
                            </td>
                            <td>
                                <span class="contact-subject" th:text="${contact.subject}"></span>
                            </td>
                            <td class="message-cell" th:text="${contact.message}"></td>
                            <td>
                                <span class="date-badge" th:text="${#dates.format(contact.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a class="btn modern-btn btn-success-modern btn-sm" th:href="@{/admin/contacts/response/__${contact.id}__}">
                                        <i class="fas fa-reply"></i>
                                        Phản hồi
                                    </a>
                                    <button class="btn modern-btn btn-danger-modern btn-sm" th:onclick="'deleteContact(' + ${contact.id}+')'">
                                        <i class="fas fa-trash"></i>
                                        Xóa
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="d-flex justify-content-center" th:if="${totalPages > 1}">
                    <nav aria-label="Page navigation example" class="pagination-modern">
                        <ul class="pagination mb-0">
                            <li th:class="${pageNumber == currentPage + 1 ? 'page-item active' : 'page-item'}" th:each="pageNumber : ${#numbers.sequence(1,totalPages)}">
                                <a class="page-link" th:href="@{/admin/contacts(page=${pageNumber},sort_by=${sortBy})}" th:text="${pageNumber}"></a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </main>
        
        <script>
            function submitSort() {
                document.getElementById("yourFormId").submit();
            }
            
            function deleteContact(contactId) {
                if (confirm("Bạn muốn xoá liên hệ này ?")) {
                    window.location.href = "/admin/contacts/delete/" + contactId;
                } else {
                    return;
                }
            }
        </script>

        <div th:replace="admin/fragments/footer :: footer"></div>
    </div>
</div>

<script crossorigin="anonymous" th:src="@{/js/admin/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/admin/scripts.js}"></script>
<script th:src="@{/js/admin/contacts.js}"></script>
</body>

</html>
