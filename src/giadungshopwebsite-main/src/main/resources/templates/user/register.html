<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta content="ie=edge" http-equiv="x-ua-compatible">
    <title>E-Gadgets</title>
    <meta content="" name="description">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <!-- Favicons -->
    <link rel="shortcut icon" th:href="@{/images/favicon.ico}">
    <link rel="apple-touch-icon" th:href="@{/images/icon.png}">

    <!-- Google font (font-family: 'Roboto', sans-serif; Poppins ; Satisfy) -->
    <link rel="stylesheet" th:href="@{/css/user/open_sans.css}">
    <link rel="stylesheet" th:href="@{/css/user/poppins.css}">
    <link rel="stylesheet" th:href="@{/css/user/roboto.css}">

    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/css/user/bootstrap.min.css}">

    <!-- Plugins css -->
    <link rel="stylesheet" th:href="@{/css/user/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/bicon.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/pe-icon-7-stroke.css}">
    <link rel="stylesheet" th:href="@{/css/user/slick.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/fakeloader.css}">
    <link rel="stylesheet" th:href="@{/css/user/nivo-slider.css}">
    <link rel="stylesheet" th:href="@{/css/user/nivo-preview-2.css}">
    <link rel="stylesheet" th:href="@{/css/user/owl.carousel.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/owl.theme.default.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/material-design-iconic-font.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/animation.css}">
    <link rel="stylesheet" th:href="@{/css/user/fancybox.css}">
    <link rel="stylesheet" th:href="@{/css/user/mainmenu.css}">
    <link rel="stylesheet" th:href="@{/css/user/fotorama.css}">
    <link rel="stylesheet" th:href="@{/css/user/jquery-ui.min.css}">
    <link rel="stylesheet" th:href="@{/css/user/lightbox.css}">
    <link rel="stylesheet" th:href="@{/css/user/style.css}">

    <!-- Cusom css -->
    <link rel="stylesheet" th:href="@{/css/user/custom.css}">

    <!-- Modernizer js -->
    <script th:src="@{/js/user/vendor/modernizr-3.5.0.min.js}"></script>

    <style>
        .ft__logo a img {
            max-width: 20%;
        }

        .register-field-error {
            display: none;
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.35rem;
            margin-bottom: 0;
        }

        .register-field-error.is-visible {
            display: block;
        }

        .input__box input.input-error {
            border-color: #dc3545;
        }
    </style>

</head>

<body>
<!-- Main wrapper -->
<div class="wrapper" id="wrapper">
    <!-- Header -->
    <header th:replace="~{user/fragments/header :: header}"></header>
    <!-- //Header -->
    <!-- Start Search Popup -->
    <div th:replace="user/fragments/search_popup :: search_popup"></div>
    <!-- End Search Popup -->

    <!-- Start Slider area -->
    <div class="slider-area brown__nav slider--15 slide__activation slide__arrow01 owl-carousel owl-theme">
        <!-- Start Single Slide -->
        <div class="slide animation__style10 bg-image--1 fullscreen align__center--left">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="slider__content">
                            <div class="contentbox">
                                <h2>Mua các <span>sản phẩm đồ điện tử </span></h2>
                                <h2>yêu thích <span>của bạn </span></h2>
                                <h2>tại <span>đây </span></h2>
                                <a class="shopbtn" th:href="@{/shop}">Mua hàng ngay</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- End Single Slide -->
        <!-- Start Single Slide -->
        <div class="slide animation__style10 bg-image--2 fullscreen align__center--left">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="slider__content">
                            <div class="contentbox">
                                <h2>Mua các <span>sản phẩm đồ điện tử </span></h2>
                                <h2>yêu thích <span>của bạn </span></h2>
                                <h2>tại <span>đây </span></h2>
                                <a class="shopbtn" th:href="@{/shop}">Mua hàng ngay</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- End Single Slide -->
    </div>
    <!-- End Slider area -->

    <!-- Start My Account Area -->
    <section class="my_account_area pt--80 pb--55 bg--white">
        <div class="container mt--100">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-12">
                    <div class="my__account__wrapper">
                        <h3 class="account__title">Đăng ký</h3>
                        <form method="post" novalidate onsubmit="return validateForm()" th:action="@{/register}"
                              th:object="${user}">

                            <div th:if="${success}">
                                <div class="alert alert-success" role="alert">
                                    Đăng ký thành công!
                                </div>
                            </div>
                            <div th:if="${error}">
                                <div class="alert alert-danger" role="alert">
                                    Email này đã được sử dụng
                                </div>
                            </div>

                            <div class="account__form">
                                <div class="input__box">
                                    <label>Email <span>*</span></label>
                                    <input th:field="*{email}" type="email" autocomplete="email"/>
                                    <p class="register-field-error" id="emailError" role="alert"></p>
                                </div>
                                <div class="input__box">
                                    <label>Họ tên<span>*</span></label>
                                    <input th:field="*{fullName}" type="text" autocomplete="name"/>
                                    <p class="register-field-error" id="fullNameError" role="alert"></p>
                                </div>
                                <div class="input__box">
                                    <label>Địa chỉ<span>*</span></label>
                                    <input th:field="*{address}" type="text" autocomplete="street-address"/>
                                    <p class="register-field-error" id="addressError" role="alert"></p>
                                </div>
                                <div class="input__box">
                                    <label>Số điện thoại<span>*</span></label>
                                    <input th:field="*{phoneNumber}" type="tel" autocomplete="tel"/>
                                    <p class="register-field-error" id="phoneNumberError" role="alert"></p>
                                </div>
                                <div class="input__box">
                                    <label>Mật khẩu<span>*</span></label>
                                    <input id="password" th:field="*{password}" type="password"
                                           autocomplete="new-password"/>
                                    <p class="register-field-error" id="passwordError" role="alert"></p>
                                </div>
                                <div class="input__box">
                                    <label>Nhập lại mật khẩu<span>*</span></label>
                                    <input id="confirmPassword" name="confirmPassword" type="password"
                                           autocomplete="new-password"/>
                                    <p class="register-field-error" id="confirmPasswordError" role="alert"></p>
                                </div>


                                <div class="form__btn">
                                    <button type="submit">Đăng ký</button>
                                </div>
                                <a class="forget_pass" th:href="@{/login}">Đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- End My Account Area -->
    <!-- Footer Area -->
    <footer th:replace="user/fragments/footer :: footer"></footer>
    <!-- //Footer Area -->
    <script>
        (function () {
            var requiredMsg = 'Trường này không được để trống.';

            function setFieldError(inputId, errorId, message) {
                var input = document.getElementById(inputId);
                var err = document.getElementById(errorId);
                if (!err) {
                    return;
                }
                if (message) {
                    err.textContent = message;
                    err.classList.add('is-visible');
                    if (input) {
                        input.classList.add('input-error');
                    }
                } else {
                    err.textContent = '';
                    err.classList.remove('is-visible');
                    if (input) {
                        input.classList.remove('input-error');
                    }
                }
            }

            function clearAllFieldErrors() {
                [
                    ['email', 'emailError'],
                    ['fullName', 'fullNameError'],
                    ['address', 'addressError'],
                    ['phoneNumber', 'phoneNumberError'],
                    ['password', 'passwordError'],
                    ['confirmPassword', 'confirmPasswordError']
                ].forEach(function (pair) {
                    setFieldError(pair[0], pair[1], null);
                });
            }

            window.validateForm = function () {
                clearAllFieldErrors();

                var emailEl = document.getElementById('email');
                var fullNameEl = document.getElementById('fullName');
                var addressEl = document.getElementById('address');
                var phoneEl = document.getElementById('phoneNumber');
                var passwordEl = document.getElementById('password');
                var confirmEl = document.getElementById('confirmPassword');

                var email = emailEl ? emailEl.value.trim() : '';
                var fullName = fullNameEl ? fullNameEl.value.trim() : '';
                var address = addressEl ? addressEl.value.trim() : '';
                var phoneNumber = phoneEl ? phoneEl.value.trim() : '';
                var password = passwordEl ? passwordEl.value : '';
                var confirmPassword = confirmEl ? confirmEl.value : '';

                if (emailEl) {
                    emailEl.value = email;
                }
                if (fullNameEl) {
                    fullNameEl.value = fullName;
                }
                if (addressEl) {
                    addressEl.value = address;
                }
                if (phoneEl) {
                    phoneEl.value = phoneNumber;
                }

                var hasError = false;

                if (!email) {
                    setFieldError('email', 'emailError', requiredMsg);
                    hasError = true;
                }
                if (!fullName) {
                    setFieldError('fullName', 'fullNameError', requiredMsg);
                    hasError = true;
                }
                if (!address) {
                    setFieldError('address', 'addressError', requiredMsg);
                    hasError = true;
                }
                if (!phoneNumber) {
                    setFieldError('phoneNumber', 'phoneNumberError', requiredMsg);
                    hasError = true;
                }
                if (!password) {
                    setFieldError('password', 'passwordError', requiredMsg);
                    hasError = true;
                }
                if (!confirmPassword) {
                    setFieldError('confirmPassword', 'confirmPasswordError', requiredMsg);
                    hasError = true;
                }

                if (hasError) {
                    return false;
                }

                var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    setFieldError('email', 'emailError', 'Email không hợp lệ');
                    return false;
                }

                if (/[^0-9]/.test(phoneNumber)) {
                    setFieldError('phoneNumber', 'phoneNumberError', 'Số điện thoại chỉ được nhập số');
                    return false;
                }
                if (phoneNumber.length !== 10) {
                    setFieldError('phoneNumber', 'phoneNumberError', 'Số điện thoại không đúng định dạng');
                    return false;
                }

                if (password.length < 6) {
                    setFieldError('password', 'passwordError',
                        'Mật khẩu chưa đủ độ dài an toàn (ít nhất 6 ký tự)');
                    return false;
                }

                if (password !== confirmPassword) {
                    setFieldError('confirmPassword', 'confirmPasswordError', 'Nhập lại mật khẩu không chính xác');
                    return false;
                }

                return true;
            };

            document.addEventListener('DOMContentLoaded', function () {
                var fields = ['email', 'fullName', 'address', 'phoneNumber', 'password', 'confirmPassword'];
                var errorMap = {
                    email: 'emailError',
                    fullName: 'fullNameError',
                    address: 'addressError',
                    phoneNumber: 'phoneNumberError',
                    password: 'passwordError',
                    confirmPassword: 'confirmPasswordError'
                };
                fields.forEach(function (fid) {
                    var input = document.getElementById(fid);
                    if (!input) {
                        return;
                    }
                    input.addEventListener('input', function () {
                        setFieldError(fid, errorMap[fid], null);
                    });
                });
            });
        })();
    </script>

</div>
<!-- //Main wrapper -->
<!-- JS Files -->
<script th:src="@{/js/user/vendor/jquery-3.2.1.min.js}"></script>
<script th:src="@{/js/user/popper.min.js}"></script>
<script th:src="@{/js/user/bootstrap.min.js}"></script>
<script th:src="@{/js/user/plugins.js}"></script>
<script th:src="@{/js/user/active.js}"></script>
</body>

</html>
